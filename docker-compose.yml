services:
  bemby:
    image: liveinaus/bemby:latest
    restart: unless-stopped
    ports:
      - "${PORT:-3000}:3000" # set PORT in .env to change the host-side port
    volumes:
      - /docker/bemby-data:/app/data
    environment:
      PORT: 3000
      ADMIN_USERNAME: ${ADMIN_USERNAME:-admin}    # change this
      ADMIN_PASSWORD: ${ADMIN_PASSWORD:-changeme} # change this
      # Secret used to sign login tokens — set to any long random string, e.g. openssl rand -hex 32
      JWT_SECRET: ${JWT_SECRET:-change-me-in-production}
      TZ: ${TZ:-Australia/Sydney}
